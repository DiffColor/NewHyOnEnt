name: Tag Build All Projects

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-manager-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x86

      - name: Restore NuGet packages
        run: nuget restore "Manager/AndoW_Manager/AndoW_Manager.sln" -PackagesDirectory "Manager/packages" -NonInteractive

      - name: Prepare Manager dependencies in build directory
        shell: pwsh
        run: |
          $src = "Manager/Dependencies"
          $destinations = @(
            "Manager/dll",
            "Manager/AndoW_Manager/bin/Release",
            "Manager/AndoW_Manager/bin/x64/Release",
            "Manager/AndoW_Settings/bin/Release",
            "Manager/AndoW_Settings/bin/x64/Release"
          )
          foreach ($dst in $destinations) {
            New-Item -ItemType Directory -Force -Path $dst | Out-Null
            Copy-Item -Path "$src/*.dll" -Destination $dst -Force
          }

      - name: Build Manager (Release x64)
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $msbuild = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -find "MSBuild\**\Bin\MSBuild.exe" | Where-Object { $_ -notmatch "amd64" } | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($msbuild)) { throw "x86 MSBuild not found." }
          & $msbuild "Manager/AndoW_Manager/AndoW_Manager.sln" /t:Build /p:Configuration=Release /p:Platform=x64 /m

      - name: Package Manager binaries for release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $zip = "release-assets/manager-windows-${{ github.ref_name }}.zip"
          $packageRoot = "release-assets/manager-windows-${{ github.ref_name }}-staging"
          Remove-Item -Recurse -Force $packageRoot -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null
          Copy-Item -Path "Manager/AndoW_Manager/bin/x64/Release/*" -Destination $packageRoot -Recurse -Force
          Copy-Item -Path "Manager/AndoW_Settings/bin/x64/Release/*" -Destination $packageRoot -Recurse -Force
          Compress-Archive -Path "$packageRoot/*" -DestinationPath $zip -Force

      - name: Upload Manager artifact
        uses: actions/upload-artifact@v4
        with:
          name: manager-windows-${{ github.ref_name }}
          path: release-assets/manager-windows-${{ github.ref_name }}.zip
          if-no-files-found: error

      - name: Upload Manager release asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-manager-${{ github.ref_name }}
          path: release-assets/manager-windows-${{ github.ref_name }}.zip
          if-no-files-found: error

  build-player-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x86

      - name: Restore NuGet packages
        run: nuget restore "Player/Windows/AndoW Player.sln" -PackagesDirectory "Player/Windows/packages" -NonInteractive

      - name: Prepare Player dependencies in build directories
        shell: pwsh
        run: |
          $src = "Player/Windows/Dependencies"
          $destinations = @(
            "Player/Windows/AndoW_Player/bin/x64/Release",
            "Player/Windows/ConfigPlayer/bin/x64/Release"
          )
          foreach ($dst in $destinations) {
            New-Item -ItemType Directory -Force -Path $dst | Out-Null
            Copy-Item -Path "$src/*.dll" -Destination $dst -Force
          }

      - name: Build Player Windows (Release x64)
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $msbuild = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -find "MSBuild\**\Bin\MSBuild.exe" | Where-Object { $_ -notmatch "amd64" } | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($msbuild)) { throw "x86 MSBuild not found." }
          & $msbuild "Player/Windows/AndoW Player.sln" /t:Build /p:Configuration=Release /p:Platform=x64 /m

      - name: Package Player Windows binaries for release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $zip = "release-assets/player-windows-${{ github.ref_name }}.zip"
          $packageRoot = "release-assets/player-windows-${{ github.ref_name }}-staging"
          Remove-Item -Recurse -Force $packageRoot -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null
          Copy-Item -Path "Player/Windows/AndoW_Player/bin/x64/Release/*" -Destination $packageRoot -Recurse -Force
          Copy-Item -Path "Player/Windows/ConfigPlayer/bin/x64/Release/*" -Destination $packageRoot -Recurse -Force
          Compress-Archive -Path "$packageRoot/*" -DestinationPath $zip -Force

      - name: Upload Player Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: player-windows-${{ github.ref_name }}
          path: release-assets/player-windows-${{ github.ref_name }}.zip
          if-no-files-found: error

      - name: Upload Player Windows release asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-player-windows-${{ github.ref_name }}
          path: release-assets/player-windows-${{ github.ref_name }}.zip
          if-no-files-found: error

  build-player-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup JDK 17 for sdkmanager
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK environment
        run: |
          echo "ANDROID_HOME=$RUNNER_TEMP/android-sdk-player" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$RUNNER_TEMP/android-sdk-player" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=" >> $GITHUB_ENV
          echo "NDK_HOME=" >> $GITHUB_ENV
          echo "NDK_ROOT=" >> $GITHUB_ENV
          mkdir -p "$RUNNER_TEMP/android-sdk-player"

      - name: Install Android SDK packages
        run: |
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --version
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses || true
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root="$ANDROID_SDK_ROOT" \
            "cmdline-tools;latest" "platform-tools" "platforms;android-22" "build-tools;29.0.2"
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      - name: Setup JDK 11 for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Prepare local.properties for CI
        working-directory: Player/Android
        run: |
          printf "sdk.dir=%s\n" "$ANDROID_SDK_ROOT" > local.properties

      - name: Build Player Android (Release APK)
        working-directory: Player/Android
        run: |
          unset ANDROID_NDK_HOME ANDROID_NDK_ROOT NDK_HOME NDK_ROOT
          chmod +x ./gradlew
          ./gradlew --no-daemon clean :app:assembleRelease -x lintVitalRelease -x lint

      - name: Verify Player Android APK signature
        working-directory: Player/Android
        run: |
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          test -f "$APK_PATH"
          "$ANDROID_HOME/build-tools/29.0.2/apksigner" verify --verbose "$APK_PATH"

      - name: Upload Player Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: player-android-${{ github.ref_name }}
          path: Player/Android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn

      - name: Collect Android APK as release asset
        run: |
          mkdir -p release-assets
          cp Player/Android/app/build/outputs/apk/release/app-release.apk "release-assets/player-android-${{ github.ref_name }}.apk"

      - name: Upload Player Android release asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-player-android-${{ github.ref_name }}
          path: release-assets/player-android-${{ github.ref_name }}.apk
          if-no-files-found: error

  build-player-launcher-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup JDK 17 for sdkmanager
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK environment
        run: |
          echo "ANDROID_HOME=$RUNNER_TEMP/android-sdk-launcher" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$RUNNER_TEMP/android-sdk-launcher" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=" >> $GITHUB_ENV
          echo "NDK_HOME=" >> $GITHUB_ENV
          echo "NDK_ROOT=" >> $GITHUB_ENV
          mkdir -p "$RUNNER_TEMP/android-sdk-launcher"

      - name: Install Android SDK packages
        run: |
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --version
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses || true
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root="$ANDROID_SDK_ROOT" \
            "cmdline-tools;latest" "platform-tools" "platforms;android-22" "build-tools;29.0.2"
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      - name: Setup JDK 11 for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Prepare local.properties for CI
        working-directory: Player/TurtleLauncher
        run: |
          printf "sdk.dir=%s\n" "$ANDROID_SDK_ROOT" > local.properties

      - name: Build TurtleLauncher Android (Release APK)
        working-directory: Player/TurtleLauncher
        run: |
          unset ANDROID_NDK_HOME ANDROID_NDK_ROOT NDK_HOME NDK_ROOT
          chmod +x ./gradlew
          ./gradlew --no-daemon clean :LaLauncher:assembleRelease -x lintVitalRelease -x lint

      - name: Resolve TurtleLauncher APK path
        id: launcher_apk
        run: |
          APK_PATH=$(find Player/TurtleLauncher/LaLauncher/build/outputs/apk/release -maxdepth 1 -type f -name "*.apk" ! -name "*-unsigned.apk" | head -n 1)
          test -n "$APK_PATH"
          test -f "$APK_PATH"
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Verify TurtleLauncher APK signature
        run: |
          "$ANDROID_HOME/build-tools/29.0.2/apksigner" verify --verbose "${{ steps.launcher_apk.outputs.apk_path }}"

      - name: Upload TurtleLauncher Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: player-launcher-android-${{ github.ref_name }}
          path: ${{ steps.launcher_apk.outputs.apk_path }}
          if-no-files-found: warn

      - name: Collect TurtleLauncher APK as release asset
        run: |
          mkdir -p release-assets
          cp "${{ steps.launcher_apk.outputs.apk_path }}" "release-assets/player-launcher-android-${{ github.ref_name }}.apk"

      - name: Upload TurtleLauncher Android release asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-player-launcher-android-${{ github.ref_name }}
          path: release-assets/player-launcher-android-${{ github.ref_name }}.apk
          if-no-files-found: error

  build-player-watchdog-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup JDK 17 for sdkmanager
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK environment
        run: |
          echo "ANDROID_HOME=$RUNNER_TEMP/android-sdk-watchdog" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$RUNNER_TEMP/android-sdk-watchdog" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=" >> $GITHUB_ENV
          echo "NDK_HOME=" >> $GITHUB_ENV
          echo "NDK_ROOT=" >> $GITHUB_ENV
          mkdir -p "$RUNNER_TEMP/android-sdk-watchdog"

      - name: Install Android SDK packages
        run: |
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --version
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses || true
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root="$ANDROID_SDK_ROOT" \
            "cmdline-tools;latest" "platform-tools" "platforms;android-22" "build-tools;29.0.2"
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      - name: Setup JDK 11 for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Prepare local.properties for CI
        working-directory: Player/WatchDog_4launcher
        run: |
          printf "sdk.dir=%s\n" "$ANDROID_SDK_ROOT" > local.properties

      - name: Build WatchDog Android (Release APK)
        working-directory: Player/WatchDog_4launcher
        run: |
          unset ANDROID_NDK_HOME ANDROID_NDK_ROOT NDK_HOME NDK_ROOT
          chmod +x ./gradlew
          ./gradlew --no-daemon clean :app:assembleRelease -x lintVitalRelease -x lint

      - name: Resolve WatchDog APK path
        id: watchdog_apk
        run: |
          APK_PATH=$(find Player/WatchDog_4launcher/app/build/outputs/apk/release -maxdepth 1 -type f -name "*.apk" ! -name "*-unsigned.apk" | head -n 1)
          test -n "$APK_PATH"
          test -f "$APK_PATH"
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Verify WatchDog APK signature
        run: |
          "$ANDROID_HOME/build-tools/29.0.2/apksigner" verify --verbose "${{ steps.watchdog_apk.outputs.apk_path }}"

      - name: Upload WatchDog Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: player-watchdog-android-${{ github.ref_name }}
          path: ${{ steps.watchdog_apk.outputs.apk_path }}
          if-no-files-found: warn

      - name: Collect WatchDog APK as release asset
        run: |
          mkdir -p release-assets
          cp "${{ steps.watchdog_apk.outputs.apk_path }}" "release-assets/player-watchdog-android-${{ github.ref_name }}.apk"

      - name: Upload WatchDog Android release asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-player-watchdog-android-${{ github.ref_name }}
          path: release-assets/player-watchdog-android-${{ github.ref_name }}.apk
          if-no-files-found: error

  publish-release:
    needs:
      - build-manager-windows
      - build-player-windows
      - build-player-android
      - build-player-launcher-android
      - build-player-watchdog-android
    runs-on: ubuntu-latest
    steps:
      - name: Download Manager release asset
        uses: actions/download-artifact@v4
        with:
          name: release-asset-manager-${{ github.ref_name }}
          path: release-assets/manager

      - name: Download Player Windows release asset
        uses: actions/download-artifact@v4
        with:
          name: release-asset-player-windows-${{ github.ref_name }}
          path: release-assets/player-windows

      - name: Download Player Android release asset
        uses: actions/download-artifact@v4
        with:
          name: release-asset-player-android-${{ github.ref_name }}
          path: release-assets/player-android

      - name: Download TurtleLauncher Android release asset
        uses: actions/download-artifact@v4
        with:
          name: release-asset-player-launcher-android-${{ github.ref_name }}
          path: release-assets/player-launcher-android

      - name: Download WatchDog Android release asset
        uses: actions/download-artifact@v4
        with:
          name: release-asset-player-watchdog-android-${{ github.ref_name }}
          path: release-assets/player-watchdog-android

      - name: Attach all build outputs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            release-assets/manager/*.zip
            release-assets/player-windows/*.zip
            release-assets/player-android/*.apk
            release-assets/player-launcher-android/*.apk
            release-assets/player-watchdog-android/*.apk
          overwrite_files: true
