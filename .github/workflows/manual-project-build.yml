name: Manual Build by Project

on:
  workflow_dispatch:
    inputs:
      project:
        description: Build target project
        required: true
        type: choice
        options:
          - manager-windows
          - player-windows
          - player-android
      source_ref:
        description: Branch / tag / commit to build
        required: true
        default: main
        type: string
      release_tag:
        description: Release tag (비우면 자동 생성)
        required: false
        default: ""
        type: string
      release_name:
        description: Release name (비우면 자동 생성)
        required: false
        default: ""
        type: string
      prerelease:
        description: GitHub Release prerelease 여부
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-manager-windows:
    if: ${{ inputs.project == 'manager-windows' }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          lfs: true

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x86

      - name: Resolve release metadata
        id: release_meta
        shell: pwsh
        run: |
          $tagInput = "${{ inputs.release_tag }}".Trim()
          if ([string]::IsNullOrWhiteSpace($tagInput)) {
            $tag = "manual-${{ inputs.project }}-run-${{ github.run_number }}"
            $artifactSuffix = "run-${{ github.run_number }}"
          } else {
            $tag = $tagInput
            $artifactSuffix = ($tagInput -replace '[^0-9A-Za-z._-]+','-')
            if ([string]::IsNullOrWhiteSpace($artifactSuffix)) {
              $artifactSuffix = "run-${{ github.run_number }}"
            }
          }

          $name = "${{ inputs.release_name }}".Trim()
          if ([string]::IsNullOrWhiteSpace($name)) {
            $name = "Manual ${{ inputs.project }} build #${{ github.run_number }}"
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "name=$name" >> $env:GITHUB_OUTPUT
          "artifact_suffix=$artifactSuffix" >> $env:GITHUB_OUTPUT

      - name: Restore NuGet packages
        run: nuget restore "Manager/AndoW_Manager/AndoW_Manager.sln" -PackagesDirectory "Manager/packages" -NonInteractive

      - name: Prepare Manager dependencies in build directory
        shell: pwsh
        run: |
          $src = "Manager/Dependencies"
          $destinations = @(
            "Manager/dll",
            "Manager/AndoW_Manager/bin/Release",
            "Manager/AndoW_Manager/bin/x64/Release"
          )
          foreach ($dst in $destinations) {
            New-Item -ItemType Directory -Force -Path $dst | Out-Null
            Copy-Item -Path "$src/*.dll" -Destination $dst -Force
          }

      - name: Build Manager (Release x64)
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $msbuild = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -find "MSBuild\**\Bin\MSBuild.exe" | Where-Object { $_ -notmatch "amd64" } | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($msbuild)) { throw "x86 MSBuild not found." }
          & $msbuild "Manager/AndoW_Manager/AndoW_Manager.sln" /t:Build /p:Configuration=Release /p:Platform=x64 /m

      - name: Upload Manager artifact
        uses: actions/upload-artifact@v4
        with:
          name: manager-windows-manual-${{ steps.release_meta.outputs.artifact_suffix }}
          path: Manager/AndoW_Manager/**/bin/**/Release/**
          if-no-files-found: warn

      - name: Package Manager binaries for release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          tar -a -c -f "release-assets/manager-windows-manual-${{ steps.release_meta.outputs.artifact_suffix }}.zip" "Manager/AndoW_Manager/bin"

      - name: Attach Manager binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          target_commitish: ${{ inputs.source_ref }}
          prerelease: ${{ inputs.prerelease }}
          files: release-assets/manager-windows-manual-${{ steps.release_meta.outputs.artifact_suffix }}.zip
          overwrite_files: true

  build-player-windows:
    if: ${{ inputs.project == 'player-windows' }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          lfs: true

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x86

      - name: Resolve release metadata
        id: release_meta
        shell: pwsh
        run: |
          $tagInput = "${{ inputs.release_tag }}".Trim()
          if ([string]::IsNullOrWhiteSpace($tagInput)) {
            $tag = "manual-${{ inputs.project }}-run-${{ github.run_number }}"
            $artifactSuffix = "run-${{ github.run_number }}"
          } else {
            $tag = $tagInput
            $artifactSuffix = ($tagInput -replace '[^0-9A-Za-z._-]+','-')
            if ([string]::IsNullOrWhiteSpace($artifactSuffix)) {
              $artifactSuffix = "run-${{ github.run_number }}"
            }
          }

          $name = "${{ inputs.release_name }}".Trim()
          if ([string]::IsNullOrWhiteSpace($name)) {
            $name = "Manual ${{ inputs.project }} build #${{ github.run_number }}"
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "name=$name" >> $env:GITHUB_OUTPUT
          "artifact_suffix=$artifactSuffix" >> $env:GITHUB_OUTPUT

      - name: Restore NuGet packages
        run: nuget restore "Player/Windows/AndoW Player.sln" -PackagesDirectory "Player/Windows/packages" -NonInteractive

      - name: Prepare Player dependencies in build directories
        shell: pwsh
        run: |
          $src = "Player/Windows/Dependencies"
          $destinations = @(
            "Player/Windows/AndoW_Player/bin/x64/Release",
            "Player/Windows/ConfigPlayer/bin/x64/Release"
          )
          foreach ($dst in $destinations) {
            New-Item -ItemType Directory -Force -Path $dst | Out-Null
            Copy-Item -Path "$src/*.dll" -Destination $dst -Force
          }

      - name: Build Player Windows (Release x64)
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $msbuild = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -find "MSBuild\**\Bin\MSBuild.exe" | Where-Object { $_ -notmatch "amd64" } | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($msbuild)) { throw "x86 MSBuild not found." }
          & $msbuild "Player/Windows/AndoW Player.sln" /t:Build /p:Configuration=Release /p:Platform=x64 /m

      - name: Upload Player Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: player-windows-manual-${{ steps.release_meta.outputs.artifact_suffix }}
          path: Player/Windows/**/bin/**/Release/**
          if-no-files-found: warn

      - name: Package Player Windows binaries for release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          tar -a -c -f "release-assets/player-windows-manual-${{ steps.release_meta.outputs.artifact_suffix }}.zip" "Player/Windows/AndoW_Player/bin" "Player/Windows/ConfigPlayer/bin"

      - name: Attach Player Windows binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          target_commitish: ${{ inputs.source_ref }}
          prerelease: ${{ inputs.prerelease }}
          files: release-assets/player-windows-manual-${{ steps.release_meta.outputs.artifact_suffix }}.zip
          overwrite_files: true

  build-player-android:
    if: ${{ inputs.project == 'player-android' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          lfs: true

      - name: Setup JDK 17 for sdkmanager
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Resolve release metadata
        id: release_meta
        shell: pwsh
        run: |
          $tagInput = "${{ inputs.release_tag }}".Trim()
          if ([string]::IsNullOrWhiteSpace($tagInput)) {
            $tag = "manual-${{ inputs.project }}-run-${{ github.run_number }}"
            $artifactSuffix = "run-${{ github.run_number }}"
          } else {
            $tag = $tagInput
            $artifactSuffix = ($tagInput -replace '[^0-9A-Za-z._-]+','-')
            if ([string]::IsNullOrWhiteSpace($artifactSuffix)) {
              $artifactSuffix = "run-${{ github.run_number }}"
            }
          }

          $name = "${{ inputs.release_name }}".Trim()
          if ([string]::IsNullOrWhiteSpace($name)) {
            $name = "Manual ${{ inputs.project }} build #${{ github.run_number }}"
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "name=$name" >> $env:GITHUB_OUTPUT
          "artifact_suffix=$artifactSuffix" >> $env:GITHUB_OUTPUT

      - name: Setup Android SDK environment
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH

      - name: Install Android SDK packages
        run: |
          sdkmanager --version
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-22" "build-tools;29.0.2"

      - name: Setup JDK 11 for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Build Player Android (Release APK)
        working-directory: Player/Android
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon clean :app:assembleRelease

      - name: Upload Player Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: player-android-manual-${{ steps.release_meta.outputs.artifact_suffix }}
          path: Player/Android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Attach Player Android APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          target_commitish: ${{ inputs.source_ref }}
          prerelease: ${{ inputs.prerelease }}
          files: Player/Android/app/build/outputs/apk/release/*.apk
          overwrite_files: true
