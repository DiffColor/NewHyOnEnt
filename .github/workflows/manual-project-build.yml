          path: release-assets/player-usbinstaller-android-manual-${{ steps.release_meta.outputs.artifact_suffix }}-*.apk
          if-no-files-found: warn

      - name: Attach USBInstaller Android APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          target_commitish: ${{ inputs.source_ref }}
          prerelease: ${{ inputs.prerelease }}
          files: release-assets/player-usbinstaller-android-manual-${{ steps.release_meta.outputs.artifact_suffix }}-*.apk
          overwrite_files: true

  build-player-launcher-android:
    if: ${{ inputs.project == 'player-launcher-android' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          lfs: true

      - name: Setup JDK 17 for sdkmanager
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Resolve release metadata
        id: release_meta
        shell: pwsh
        run: |
          $tagInput = "${{ inputs.release_tag }}".Trim()
          if ([string]::IsNullOrWhiteSpace($tagInput)) {
            $latest = git ls-remote --tags --refs origin "v*" |
              ForEach-Object { ($_ -split '\s+')[1] } |
              ForEach-Object { $_ -replace '^refs/tags/', '' } |
              Where-Object { $_ -match '^v\d+\.\d+\.\d+$' } |
              ForEach-Object { $_.Substring(1) } |
              ForEach-Object { [version]$_ } |
              Sort-Object |
              Select-Object -Last 1

            if ($null -eq $latest) {
              $next = [version]"1.0.0"
            } else {
              $next = [version]::new($latest.Major, $latest.Minor, $latest.Build + 1)
            }
            $tag = "v$next"
          } else {
            $tag = $tagInput
          }

          $artifactSuffix = ($tag -replace '[^0-9A-Za-z._-]+', '-')
          if ([string]::IsNullOrWhiteSpace($artifactSuffix)) {
            $artifactSuffix = "run-${{ github.run_number }}"
          }

          $repoName = "${{ github.repository }}".Split('/')[1]
          $nameInput = "${{ inputs.release_name }}".Trim()
          if ([string]::IsNullOrWhiteSpace($nameInput)) {
            $name = $repoName
          } else {
            $name = $nameInput
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "name=$name" >> $env:GITHUB_OUTPUT
          "artifact_suffix=$artifactSuffix" >> $env:GITHUB_OUTPUT

      - name: Setup Android SDK environment
        run: |
          echo "ANDROID_HOME=$RUNNER_TEMP/android-sdk-launcher" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$RUNNER_TEMP/android-sdk-launcher" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=" >> $GITHUB_ENV
          echo "NDK_HOME=" >> $GITHUB_ENV
          echo "NDK_ROOT=" >> $GITHUB_ENV
          mkdir -p "$RUNNER_TEMP/android-sdk-launcher"

      - name: Install Android SDK packages
        run: |
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --version
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses || true
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root="$ANDROID_SDK_ROOT" \
            "platform-tools" "platforms;android-22" "platforms;android-30" "build-tools;29.0.2" "build-tools;30.0.3"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      - name: Setup JDK 11 for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Build TurtleLauncher Android release asset
        run: |
          bash ./.github/scripts/build-android-release-assets.sh \
            launcher \
            "player-launcher-android-manual-${{ steps.release_meta.outputs.artifact_suffix }}" \
            "release-assets"

      - name: Upload TurtleLauncher Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: player-launcher-android-manual-${{ steps.release_meta.outputs.artifact_suffix }}
          path: release-assets/player-launcher-android-manual-${{ steps.release_meta.outputs.artifact_suffix }}.apk
          if-no-files-found: warn

      - name: Attach TurtleLauncher Android APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          target_commitish: ${{ inputs.source_ref }}
          prerelease: ${{ inputs.prerelease }}
          files: release-assets/player-launcher-android-manual-${{ steps.release_meta.outputs.artifact_suffix }}.apk
          overwrite_files: true

