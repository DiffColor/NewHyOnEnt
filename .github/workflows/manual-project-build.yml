          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      - name: Setup JDK 11 for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Prepare local.properties for CI
        working-directory: Player/TurtleLauncher
        run: |
          printf "sdk.dir=%s\n" "$ANDROID_SDK_ROOT" > local.properties

      - name: Build TurtleLauncher Android (Release APK)
        working-directory: Player/TurtleLauncher
        run: |
          unset ANDROID_NDK_HOME ANDROID_NDK_ROOT NDK_HOME NDK_ROOT
          chmod +x ./gradlew
          ./gradlew --no-daemon clean :LaLauncher:assembleRelease -x lintVitalRelease -x lint

      - name: Resolve TurtleLauncher APK path
        id: launcher_apk
        run: |
          APK_PATH=$(find Player/TurtleLauncher/LaLauncher/build/outputs/apk/release -maxdepth 1 -type f -name "*.apk" ! -name "*-unsigned.apk" | head -n 1)
          test -n "$APK_PATH"
          test -f "$APK_PATH"
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Verify TurtleLauncher APK signature
        run: |
          "$ANDROID_HOME/build-tools/29.0.2/apksigner" verify --verbose "${{ steps.launcher_apk.outputs.apk_path }}"

      - name: Upload TurtleLauncher Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: player-launcher-android-manual-${{ steps.release_meta.outputs.artifact_suffix }}
          path: ${{ steps.launcher_apk.outputs.apk_path }}
          if-no-files-found: warn

      - name: Collect TurtleLauncher APK as release asset
        run: |
          mkdir -p release-assets
          cp "${{ steps.launcher_apk.outputs.apk_path }}" "release-assets/player-launcher-android-manual-${{ steps.release_meta.outputs.artifact_suffix }}.apk"

      - name: Attach TurtleLauncher Android APK to GitHub Release
