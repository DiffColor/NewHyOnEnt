name: Manual Build by Project

on:
  workflow_dispatch:
    inputs:
      project:
        description: Build target project
        required: true
        type: choice
        options:
          - manager-windows
          - player-windows
          - player-android
          - player-notifier-android
          - player-usbinstaller-android
          - player-launcher-android
          - player-watchdog-android
      source_ref:
        description: Branch / tag / commit to build
        required: true
        default: main
        type: string
      release_tag:
        description: Release tag (비우면 최신 vX.Y.Z에서 patch +1 자동 생성)
        required: false
        default: ""
        type: string
      release_name:
        description: Release name (비우면 저장소 이름 사용)
        required: false
        default: ""
        type: string
      prerelease:
        description: GitHub Release prerelease 여부
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-manager-windows:
    if: ${{ inputs.project == 'manager-windows' }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          lfs: true

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x86

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Normalize Manager solution paths
        shell: pwsh
        run: ./.github/scripts/normalize-solution-paths.ps1 "Manager/NewHyOn_Manager.sln"

      - name: Resolve release metadata
        id: release_meta
        shell: pwsh
        run: |
          $tagInput = "${{ inputs.release_tag }}".Trim()
          if ([string]::IsNullOrWhiteSpace($tagInput)) {
            $latest = git ls-remote --tags --refs origin "v*" |
              ForEach-Object { ($_ -split '\s+')[1] } |
              ForEach-Object { $_ -replace '^refs/tags/', '' } |
              Where-Object { $_ -match '^v\d+\.\d+\.\d+$' } |
              ForEach-Object { $_.Substring(1) } |
              ForEach-Object { [version]$_ } |
              Sort-Object |
              Select-Object -Last 1

            if ($null -eq $latest) {
              $next = [version]"1.0.0"
            } else {
              $next = [version]::new($latest.Major, $latest.Minor, $latest.Build + 1)
            }
            $tag = "v$next"
          } else {
            $tag = $tagInput
          }

          $artifactSuffix = ($tag -replace '[^0-9A-Za-z._-]+', '-')
          if ([string]::IsNullOrWhiteSpace($artifactSuffix)) {
            $artifactSuffix = "run-${{ github.run_number }}"
          }

          $repoName = "${{ github.repository }}".Split('/')[1]
          $nameInput = "${{ inputs.release_name }}".Trim()
          if ([string]::IsNullOrWhiteSpace($nameInput)) {
            $name = $repoName
          } else {
            $name = $nameInput
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "name=$name" >> $env:GITHUB_OUTPUT
          "artifact_suffix=$artifactSuffix" >> $env:GITHUB_OUTPUT

      - name: Apply Manager assembly version from tag
        shell: pwsh
        run: |
          & ".github/scripts/set-dotnet-framework-assembly-version.ps1" `
            -Tag "${{ steps.release_meta.outputs.tag }}" `
            -ProjectTagPrefix "manager-windows" `
            -AssemblyInfoPaths "Manager/NewHyOn_Manager/Properties/AssemblyInfo.cs"

      - name: Restore NuGet packages
        run: nuget restore "Manager/NewHyOn_Manager.sln" -PackagesDirectory "Manager/packages" -NonInteractive

      - name: Prepare Manager dependencies in build directory
        shell: pwsh
        run: |
          $src = "Manager/Dependencies"
          $destinations = @(
            "Manager/dll",
            "Manager/NewHyOn_Manager/bin/Release",
            "Manager/NewHyOn_Manager/bin/x64/Release"
          )
          foreach ($dst in $destinations) {
            New-Item -ItemType Directory -Force -Path $dst | Out-Null
            Copy-Item -Path "$src/*.dll" -Destination $dst -Force
          }

      - name: Build Manager (Release x64)
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $msbuild = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -find "MSBuild\**\Bin\MSBuild.exe" | Where-Object { $_ -notmatch "amd64" } | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($msbuild)) { throw "x86 MSBuild not found." }
          & $msbuild "Manager/NewHyOn_Manager.sln" /t:Build /p:Configuration=Release /p:Platform=x64 /m

      - name: Publish Manager Settings single file
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force "Manager/NewHyOn_Settings/bin/publish" -ErrorAction SilentlyContinue
          & "Manager/NewHyOn_Settings/publish-single-file.ps1" -Configuration Release

      - name: Publish StartApps Manager single file
        shell: pwsh
        run: |
          & "StartApps/publish-single-file.ps1" -StartAppsProfile manager -Configuration Release

      - name: Package Manager binaries for release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $packageRoot = "release-assets/manager-windows-manual-${{ steps.release_meta.outputs.artifact_suffix }}-staging"
          Remove-Item -Recurse -Force $packageRoot -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null
          Copy-Item -Path "Manager/NewHyOn_Manager/bin/Release/*" -Destination $packageRoot -Recurse -Force
          Copy-Item -Path "Manager/NewHyOn_Settings/bin/publish/*" -Destination $packageRoot -Recurse -Force
          Copy-Item -Path "StartApps/bin/publish/manager/*" -Destination $packageRoot -Recurse -Force
          Copy-Item -Path "Manager/ContentViewer/bin/Release/*" -Destination $packageRoot -Recurse -Force
          Copy-Item -Path "Manager/PageViewer/bin/Release/*" -Destination $packageRoot -Recurse -Force
          Compress-Archive -Path "$packageRoot/*" -DestinationPath "release-assets/manager-windows-manual-${{ steps.release_meta.outputs.artifact_suffix }}.zip" -Force

      - name: Upload Manager artifact
        uses: actions/upload-artifact@v4
        with:
          name: manager-windows-manual-${{ steps.release_meta.outputs.artifact_suffix }}
          path: release-assets/manager-windows-manual-${{ steps.release_meta.outputs.artifact_suffix }}.zip
          if-no-files-found: error

      - name: Attach Manager binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          target_commitish: ${{ inputs.source_ref }}
          prerelease: ${{ inputs.prerelease }}
          files: release-assets/manager-windows-manual-${{ steps.release_meta.outputs.artifact_suffix }}.zip
          overwrite_files: true

  build-player-windows:
    if: ${{ inputs.project == 'player-windows' }}
    runs-on: windows-latest
    steps:
