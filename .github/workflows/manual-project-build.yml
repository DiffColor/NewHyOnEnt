          Remove-Item -Recurse -Force "Player/Windows/NewHyOn_Player_Settings/bin/publish" -ErrorAction SilentlyContinue
          & "Player/Windows/NewHyOn_Player_Settings/publish-single-file.ps1" -Configuration Release

      - name: Publish StartApps Player single file
