          test -n "$APK_PATH"
          test -f "$APK_PATH"
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Verify WatchDog APK signature
        run: |
          "$ANDROID_HOME/build-tools/29.0.2/apksigner" verify --verbose "${{ steps.watchdog_apk.outputs.apk_path }}"

      - name: Upload WatchDog Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: player-watchdog-android-manual-${{ steps.release_meta.outputs.artifact_suffix }}
          path: ${{ steps.watchdog_apk.outputs.apk_path }}
          if-no-files-found: warn

      - name: Collect WatchDog APK as release asset
        run: |
          mkdir -p release-assets
          cp "${{ steps.watchdog_apk.outputs.apk_path }}" "release-assets/player-watchdog-android-manual-${{ steps.release_meta.outputs.artifact_suffix }}.apk"

      - name: Attach WatchDog Android APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          target_commitish: ${{ inputs.source_ref }}
          prerelease: ${{ inputs.prerelease }}
          files: release-assets/player-watchdog-android-manual-${{ steps.release_meta.outputs.artifact_suffix }}.apk
          overwrite_files: true
