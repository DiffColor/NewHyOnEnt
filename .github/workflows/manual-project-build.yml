      - name: Setup Android SDK environment
        run: |
          echo "ANDROID_HOME=$RUNNER_TEMP/android-sdk-launcher" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$RUNNER_TEMP/android-sdk-launcher" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=" >> $GITHUB_ENV
          echo "NDK_HOME=" >> $GITHUB_ENV
