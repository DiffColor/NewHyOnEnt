              ForEach-Object { [version]$_ } |
              Sort-Object |
              Select-Object -Last 1

            if ($null -eq $latest) {
              $next = [version]"1.0.0"
            } else {
              $next = [version]::new($latest.Major, $latest.Minor, $latest.Build + 1)
            }
            $tag = "v$next"
          } else {
            $tag = $tagInput
          }

          $artifactSuffix = ($tag -replace '[^0-9A-Za-z._-]+', '-')
          if ([string]::IsNullOrWhiteSpace($artifactSuffix)) {
            $artifactSuffix = "run-${{ github.run_number }}"
          }

          $repoName = "${{ github.repository }}".Split('/')[1]
          $nameInput = "${{ inputs.release_name }}".Trim()
          if ([string]::IsNullOrWhiteSpace($nameInput)) {
            $name = $repoName
          } else {
            $name = $nameInput
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "name=$name" >> $env:GITHUB_OUTPUT
          "artifact_suffix=$artifactSuffix" >> $env:GITHUB_OUTPUT

      - name: Setup Android SDK environment
        run: |
          echo "ANDROID_HOME=$RUNNER_TEMP/android-sdk-player" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$RUNNER_TEMP/android-sdk-player" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=" >> $GITHUB_ENV
          echo "NDK_HOME=" >> $GITHUB_ENV
          echo "NDK_ROOT=" >> $GITHUB_ENV
          mkdir -p "$RUNNER_TEMP/android-sdk-player"

      - name: Install Android SDK packages
        run: |
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --version
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses || true
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root="$ANDROID_SDK_ROOT" \
            "cmdline-tools;latest" "platform-tools" "platforms;android-22" "build-tools;29.0.2"
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      - name: Setup JDK 11 for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Prepare local.properties for CI
        working-directory: Player/Android
        run: |
          printf "sdk.dir=%s\n" "$ANDROID_SDK_ROOT" > local.properties

      - name: Build Player Android (Release APK)
        working-directory: Player/Android
        run: |
          unset ANDROID_NDK_HOME ANDROID_NDK_ROOT NDK_HOME NDK_ROOT
          chmod +x ./gradlew
          ./gradlew --no-daemon clean :app:assembleRelease -x lintVitalRelease -x lint

      - name: Verify Player Android APK signature
        working-directory: Player/Android
        run: |
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          test -f "$APK_PATH"
          "$ANDROID_HOME/build-tools/29.0.2/apksigner" verify --verbose "$APK_PATH"

      - name: Upload Player Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: player-android-manual-${{ steps.release_meta.outputs.artifact_suffix }}
          path: Player/Android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn

      - name: Attach Player Android APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          target_commitish: ${{ inputs.source_ref }}
          prerelease: ${{ inputs.prerelease }}
          files: Player/Android/app/build/outputs/apk/release/app-release.apk
          overwrite_files: true

