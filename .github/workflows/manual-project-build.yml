          lfs: true

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x86

      - name: Resolve release metadata
        id: release_meta
        shell: pwsh
        run: |
          $tagInput = "${{ inputs.release_tag }}".Trim()
          if ([string]::IsNullOrWhiteSpace($tagInput)) {
            $latest = git ls-remote --tags --refs origin "v*" |
              ForEach-Object { ($_ -split '\s+')[1] } |
              ForEach-Object { $_ -replace '^refs/tags/', '' } |
              Where-Object { $_ -match '^v\d+\.\d+\.\d+$' } |
              ForEach-Object { $_.Substring(1) } |
              ForEach-Object { [version]$_ } |
              Sort-Object |
              Select-Object -Last 1

            if ($null -eq $latest) {
              $next = [version]"1.0.0"
            } else {
              $next = [version]::new($latest.Major, $latest.Minor, $latest.Build + 1)
            }
            $tag = "v$next"
          } else {
            $tag = $tagInput
          }

          $artifactSuffix = ($tag -replace '[^0-9A-Za-z._-]+', '-')
          if ([string]::IsNullOrWhiteSpace($artifactSuffix)) {
            $artifactSuffix = "run-${{ github.run_number }}"
          }

          $repoName = "${{ github.repository }}".Split('/')[1]
          $nameInput = "${{ inputs.release_name }}".Trim()
          if ([string]::IsNullOrWhiteSpace($nameInput)) {
            $name = $repoName
          } else {
            $name = $nameInput
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "name=$name" >> $env:GITHUB_OUTPUT
          "artifact_suffix=$artifactSuffix" >> $env:GITHUB_OUTPUT

      - name: Restore NuGet packages
        run: nuget restore "Player/Windows/AndoW Player.sln" -PackagesDirectory "Player/Windows/packages" -NonInteractive

      - name: Prepare Player dependencies in build directories
        shell: pwsh
        run: |
          $src = "Player/Windows/Dependencies"
          $destinations = @(
            "Player/Windows/AndoW_Player/bin/x64/Release",
            "Player/Windows/ConfigPlayer/bin/x64/Release"
          )
          foreach ($dst in $destinations) {
            New-Item -ItemType Directory -Force -Path $dst | Out-Null
            Copy-Item -Path "$src/*.dll" -Destination $dst -Force
          }

      - name: Build Player Windows (Release x64)
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $msbuild = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -find "MSBuild\**\Bin\MSBuild.exe" | Where-Object { $_ -notmatch "amd64" } | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($msbuild)) { throw "x86 MSBuild not found." }
          & $msbuild "Player/Windows/AndoW Player.sln" /t:Build /p:Configuration=Release /p:Platform=x64 /m

      - name: Package Player Windows binaries for release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $packageRoot = "release-assets/player-windows-manual-${{ steps.release_meta.outputs.artifact_suffix }}"
          Remove-Item -Recurse -Force $packageRoot -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path "$packageRoot/AndoW_Player" | Out-Null
          New-Item -ItemType Directory -Force -Path "$packageRoot/ConfigPlayer" | Out-Null
          Copy-Item -Path "Player/Windows/AndoW_Player/bin/x64/Release/*" -Destination "$packageRoot/AndoW_Player" -Recurse -Force
          Copy-Item -Path "Player/Windows/ConfigPlayer/bin/x64/Release/*" -Destination "$packageRoot/ConfigPlayer" -Recurse -Force
          tar -a -c -f "release-assets/player-windows-manual-${{ steps.release_meta.outputs.artifact_suffix }}.zip" -C release-assets "player-windows-manual-${{ steps.release_meta.outputs.artifact_suffix }}"

      - name: Upload Player Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: player-windows-manual-${{ steps.release_meta.outputs.artifact_suffix }}
          path: release-assets/player-windows-manual-${{ steps.release_meta.outputs.artifact_suffix }}.zip
          if-no-files-found: error

      - name: Attach Player Windows binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          target_commitish: ${{ inputs.source_ref }}
          prerelease: ${{ inputs.prerelease }}
          files: release-assets/player-windows-manual-${{ steps.release_meta.outputs.artifact_suffix }}.zip
          overwrite_files: true

  build-player-android:
    if: ${{ inputs.project == 'player-android' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          lfs: true

      - name: Setup JDK 17 for sdkmanager
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Resolve release metadata
        id: release_meta
        shell: pwsh
        run: |
          $tagInput = "${{ inputs.release_tag }}".Trim()
          if ([string]::IsNullOrWhiteSpace($tagInput)) {
