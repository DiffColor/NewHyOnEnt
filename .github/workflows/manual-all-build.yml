        uses: actions/download-artifact@v4
        with:
          name: release-asset-player-usbinstaller-android-${{ needs.prepare-release.outputs.artifact_suffix }}
          path: release-assets/player-usbinstaller-android

      - name: Download TurtleLauncher Android release asset
        uses: actions/download-artifact@v4
        with:
          name: release-asset-player-launcher-android-${{ needs.prepare-release.outputs.artifact_suffix }}
          path: release-assets/player-launcher-android

      - name: Download WatchDog Android release asset
        uses: actions/download-artifact@v4
        with:
          name: release-asset-player-watchdog-android-${{ needs.prepare-release.outputs.artifact_suffix }}
          path: release-assets/player-watchdog-android

      - name: Attach all build outputs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          name: ${{ needs.prepare-release.outputs.name }}
          target_commitish: ${{ inputs.source_ref }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            release-assets/manager/*.zip
            release-assets/player-windows/*.zip
            release-assets/player-android/*.apk
            release-assets/player-notifier-android/*.apk
            release-assets/player-usbinstaller-android/*.apk
            release-assets/player-launcher-android/*.apk
            release-assets/player-watchdog-android/*.apk
          overwrite_files: true
