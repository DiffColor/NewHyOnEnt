          Copy-Item -Path "Player/Windows/NewHyOn_Player_Settings/bin/publish/*" -Destination $packageRoot -Recurse -Force
          Copy-Item -Path "StartApps/bin/publish/player/*" -Destination $packageRoot -Recurse -Force
          Compress-Archive -Path "$packageRoot/*" -DestinationPath $zip -Force

      - name: Upload Player Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: player-windows-all-${{ needs.prepare-release.outputs.artifact_suffix }}
          path: release-assets/player-windows-${{ needs.prepare-release.outputs.artifact_suffix }}.zip
          if-no-files-found: error

      - name: Upload Player Windows release asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-asset-player-windows-${{ needs.prepare-release.outputs.artifact_suffix }}
          path: release-assets/player-windows-${{ needs.prepare-release.outputs.artifact_suffix }}.zip
          if-no-files-found: error

