      - name: Build Player Windows (Release)
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $msbuild = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -find "MSBuild\**\Bin\MSBuild.exe" | Where-Object { $_ -notmatch "amd64" } | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($msbuild)) { throw "x86 MSBuild not found." }
          & $msbuild "Player/Windows/NewHyOn Player.sln" /t:Build /p:Configuration=Release /p:Platform=x64 /m

      - name: Publish Player Settings single file
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force "Player/Windows/NewHyOn_Player_Settings/bin/publish" -ErrorAction SilentlyContinue
          & "Player/Windows/NewHyOn_Player_Settings/publish-single-file.ps1" -Configuration Release

      - name: Publish StartApps Player single file
        shell: pwsh
        run: |
          & "StartApps/publish-single-file.ps1" -StartAppsProfile player -Configuration Release

      - name: Package Player Windows binaries for release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $packageRoot = "release-assets/player-windows-${{ github.ref_name }}-staging"
          Remove-Item -Recurse -Force $packageRoot -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null
          Copy-Item -Path "Player/Windows/NewHyOn_Player/bin/x64/Release/*" -Destination $packageRoot -Recurse -Force
          Copy-Item -Path "Player/Windows/NewHyOn_Player_Settings/bin/publish/*" -Destination $packageRoot -Recurse -Force
          Copy-Item -Path "StartApps/bin/publish/player/*" -Destination $packageRoot -Recurse -Force
          Compress-Archive -Path "$packageRoot/*" -DestinationPath "release-assets/player-windows-${{ github.ref_name }}.zip" -Force

      - name: Upload Player Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: player-windows-${{ github.ref_name }}
          path: release-assets/player-windows-${{ github.ref_name }}.zip
          if-no-files-found: error

      - name: Attach Player Windows binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: release-assets/player-windows-${{ github.ref_name }}.zip
          overwrite_files: true

  build-player-android:
    if: startsWith(github.ref_name, 'player-android-v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup JDK 17 for sdkmanager
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK environment
        run: |
          echo "ANDROID_HOME=$RUNNER_TEMP/android-sdk-player" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$RUNNER_TEMP/android-sdk-player" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=" >> $GITHUB_ENV
          echo "NDK_HOME=" >> $GITHUB_ENV
          echo "NDK_ROOT=" >> $GITHUB_ENV
          mkdir -p "$RUNNER_TEMP/android-sdk-player"

      - name: Install Android SDK packages
        run: |
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --version
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses || true
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root="$ANDROID_SDK_ROOT" \
            "platform-tools" "platforms;android-22" "platforms;android-30" "build-tools;29.0.2" "build-tools;30.0.3"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      - name: Setup JDK 17 for Gradle
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build Player Android release assets
        run: |
          bash ./.github/scripts/build-android-release-assets.sh \
            player \
            "player-android-${{ github.ref_name }}" \
            "release-assets"

      - name: Upload Player Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: player-android-${{ github.ref_name }}
          path: release-assets/player-android-${{ github.ref_name }}-*.apk
          if-no-files-found: warn

      - name: Attach Player Android APK to GitHub Release
