name: Tag Build by Project and OS

on:
  push:
    tags:
      - 'manager-windows-v*'
      - 'player-windows-v*'
      - 'player-android-v*'

permissions:
  contents: read

jobs:
  build-manager-windows:
    if: startsWith(github.ref_name, 'manager-windows-v')
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore "Manager/AndoW_Manager/AndoW_Manager.sln"

      - name: Build Manager (Release)
        run: msbuild "Manager/AndoW_Manager/AndoW_Manager.sln" /t:Build /p:Configuration=Release /p:Platform=AnyCPU /m

      - name: Upload Manager artifact
        uses: actions/upload-artifact@v4
        with:
          name: manager-windows-${{ github.ref_name }}
          path: Manager/AndoW_Manager/**/bin/**/Release/**
          if-no-files-found: warn

  build-player-windows:
    if: startsWith(github.ref_name, 'player-windows-v')
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore "Player/Windows/AndoW Player.sln"

      - name: Build Player Windows (Release)
        run: msbuild "Player/Windows/AndoW Player.sln" /t:Build /p:Configuration=Release /p:Platform=AnyCPU /m

      - name: Upload Player Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: player-windows-${{ github.ref_name }}
          path: Player/Windows/**/bin/**/Release/**
          if-no-files-found: warn

  build-player-android:
    if: startsWith(github.ref_name, 'player-android-v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-22" "build-tools;29.0.2"

      - name: Build Player Android (Release APK)
        working-directory: Player/Android
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon clean :app:assembleRelease

      - name: Upload Player Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: player-android-${{ github.ref_name }}
          path: Player/Android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
